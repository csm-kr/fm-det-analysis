name: coco
data_root: data
num_classes: 80

ann_train: ${.data_root}/coco/annotations/instances_train2017.json
ann_eval: ${.data_root}/coco/annotations/instances_val2017.json
images_train: ${.data_root}/coco/train2017
images_eval: ${.data_root}/coco/val2017

batch_size: 16
num_workers: 8
pin_memory: true

transforms:
  train:
    short_sides: [480, 512, 544, 576, 608, 640, 672, 704, 736, 768, 800]
    max_size: 1333
    flip_prob: 0.5
  eval:
    short_sides: [800]
    max_size: 1333
    flip_prob: 0.0

mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]
