optimizer:
  name: adamw
  lr: 2.5e-5
  weight_decay: 1.0e-4
  backbone_lr_mult: 0.1

scheduler:
  name: multistep
  warmup_iters: 1000
  warmup_factor: 0.01
  milestones: [47, 57]
  gamma: 0.1

epochs: 61
grad_clip: 1.0
amp: true

log_interval: 50
eval_interval_epoch: 1
ckpt_interval_epoch: 5
amp_dtype: bfloat16  # 'bfloat16' (B 옵션, Blackwell native) / 'float16' (GradScaler 필요) / amp:false 면 무시
